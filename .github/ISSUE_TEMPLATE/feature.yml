name: "Feature Request"
description: "機能追加・改善提案（UI/UX、投稿フロー、地図表示など）"
title: "[Feature] "
labels: ["feature", "discussion"]
body:
  - type: input
    id: purpose
    attributes:
      label: "1. Purpose（目的）"
      placeholder: "何を実現したいかを 1 行で"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "2. Context（背景）"
      placeholder: "なぜ必要か、どんな課題があるか"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "3. Proposal（提案）"
      placeholder: "- 提案内容\n- 選択肢\n- 判断基準（公平性・再現性・心理的安全性など）"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "4. Impact（影響範囲）"
      placeholder: "UI/UX、Workers API、データ構造などへの影響"
